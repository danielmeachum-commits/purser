server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API: proxied (strip the /api/ prefix so FastAPI sees its real paths)
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket: keep the path; api expects /ws
  location /ws {
    proxy_pass http://api:8000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
  }

  # LangGraph dev server: strip /langgraph prefix; allow long-poll streaming.
  location /langgraph/ {
    proxy_pass http://langgraph:2024/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_buffering off;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
